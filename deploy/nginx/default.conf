# ─────────────────────────────────────────────────────────────────────────────
# NGINX Reverse Proxy — BPR Perdana E-Form (Staging)
# ─────────────────────────────────────────────────────────────────────────────
# Routing:
#   /api/v1/*          → backend:8080  (Go API)
#   /webhooks/*        → backend:8080  (VIDA callback)
#   /health            → backend:8080  (health check)
#   /*                 → customer:80   (React SPA)
#
# Admin Dashboard diakses terpisah via port 3001

upstream backend {
    server backend:8080;
}

upstream customer {
    server customer:80;
}

server {
    listen 80;
    server_name _;

    # ── Uploads besar (KTP images, contract PDFs) ────────────────────────
    client_max_body_size 25M;

    # ── API Backend ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout untuk long-running requests (VIDA API calls bisa 30s+)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Webhooks (VIDA callback — di luar /api/v1/) ──────────────────────
    location /webhooks/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health Check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend;
    }

    # ── Frontend Customer (React SPA) — catch-all ────────────────────────
    location / {
        proxy_pass http://customer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1000;
}
